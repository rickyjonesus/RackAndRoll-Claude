name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema apps/api/prisma/schema.prisma
        env:
          # prisma generate doesn't connect to a DB, but prisma.config.ts requires this to be set
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build:api

      - run: pnpm build:web
