name: RackAndRoll
options:
  bundleIdPrefix: com.rackandroll
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  RackAndRoll:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RackAndRoll/App
      - path: RackAndRoll/Core
      - path: RackAndRoll/Models
      - path: RackAndRoll/Features
      - path: RackAndRoll/MainTabView.swift
      - path: RackAndRoll/Assets.xcassets
    info:
      path: RackAndRoll/Info.plist
      properties:
        CFBundleDisplayName: RackAndRoll
        API_BASE_URL: $(API_BASE_URL)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rackandroll.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          xcconfig: RackAndRoll/Core/Config/Environments/Debug.xcconfig
        Release:
          xcconfig: RackAndRoll/Core/Config/Environments/Release.xcconfig
  RackAndRollTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RackAndRollTests
    dependencies:
      - target: RackAndRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rackandroll.ios.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  RackAndRoll:
    build:
      targets:
        RackAndRoll: all
        RackAndRollTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RackAndRollTests
    archive:
      config: Release
